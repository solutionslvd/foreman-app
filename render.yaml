services:
  - type: web
    name: foreman-app
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD_HASH
        value: ""
      - key: BUSINESS_NAME
        value: "Foreman AI"
      - key: BUSINESS_TYPE
        value: "General Contractor"
      - key: AI_NAME
        value: "Foreman AI"
      - key: GST_RATE
        value: "0.05"
      - key: APP_BASE_URL
        value: "https://your-app.onrender.com"
      - key: ALLOWED_ORIGINS
        value: "https://your-app.onrender.com"
      - key: OPENAI_API_KEY
        value: ""
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: SMTP_FROM
        value: ""
      - key: SMTP_FROM_NAME
        value: "Foreman AI"
      - key: STRIPE_SECRET_KEY
        value: ""
      - key: STRIPE_PUBLISHABLE_KEY
        value: ""
      - key: DEBUG
        value: "false"
      - key: DEBUG_MODE
        value: "false"
      - key: PORT
        value: "10000"
      - key: DATA_DIR
        value: "/opt/render/project/src/data"
      - key: SETTINGS_FILE
        value: "/opt/render/project/src/data/settings.json"
      - key: ADMIN_TOKEN_EXPIRE_HOURS
        value: "24"